# Custom Pages deployment (added 2026-07-02). Replaces GitHub's internal
# "pages build and deployment" workflow, whose deploy step aborts after a HARD
# 10 minutes of queueing — our publisher pushes every ~12 min, so slow evenings
# (deploys taking ~9-10 min) made runs randomly fail. This workflow does the
# same deploy but is allowed to wait out a slow queue (30-min budget), and
# serializes runs so deployments never contend with each other.
name: deploy-pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
